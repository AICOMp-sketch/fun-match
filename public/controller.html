<!DOCTYPE html>
<html lang="en">

<head>
    <script src="global/loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fun Match - Controller</title>
    <link rel="stylesheet" href="controller.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <div id="join-screen">
        <h1>FUN MATCH</h1>
        <p>Join the game</p>

        <input type="text" id="name-input" placeholder="Your Name" maxlength="10">
        <input type="text" id="code-input" placeholder="ROOM CODE" maxlength="4">

        <button id="join-btn">JOIN GAME</button>
        <p id="error-msg"></p>
    </div>

    <!-- Landscape lock overlay -->
    <div id="rotate-overlay" class="rotate-overlay">
        <div class="rotate-icon">⤵</div>
        <p>Rotate your device to landscape to play</p>
    </div>

    <!-- UNO Controller -->
    <div id="uno-controller" class="controller hidden">
        <div class="uno-layout">

            <div class="uno-left-col">
                <div class="uno-header">
                    <h2 id="uno-welcome">UNO</h2>
                    <p id="uno-status">Waiting for game to start...</p>
                </div>

                <div class="uno-top-card-display">
                    <p class="uno-label">TOP CARD</p>
                    <div id="uno-top-card" class="uno-mini-card">
                        <span>-</span>
                    </div>
                    <p class="uno-color-label">Color: <span id="uno-current-color">-</span></p>
                </div>

                <!-- Draw pile — swipe up (or tap) to draw -->
                <div class="uno-draw-pile" id="uno-draw-pile">
                    <div class="uno-draw-card-back"></div>
                    <div class="uno-draw-card-back stacked"></div>
                    <p class="uno-draw-hint">SWIPE ↑<br>TO DRAW</p>
                </div>
            </div>

            <!-- Fanned hand -->
            <div class="uno-fan" id="uno-hand">
                <p class="no-cards">Waiting for cards...</p>
            </div>

        </div>

        <div id="uno-color-picker" class="uno-color-picker hidden">
            <h3>Pick a color</h3>
            <div class="uno-colors">
                <button class="uno-color red" data-color="red"></button>
                <button class="uno-color blue" data-color="blue"></button>
                <button class="uno-color green" data-color="green"></button>
                <button class="uno-color yellow" data-color="yellow"></button>
            </div>
        </div>

        <p id="uno-error" class="uno-error"></p>
    </div>

    <!-- Fighter Controller -->
    <div id="fighter-controller" class="controller hidden">
        <h2 id="fighter-welcome">FIGHT!</h2>

        <div class="fighter-layout">

            <!-- Draggable joystick / D-pad -->
            <div class="dpad-ring" id="dpad-ring">
                <div class="dpad-arrow arrow-up">▲</div>
                <div class="dpad-arrow arrow-left">◄</div>
                <div class="dpad-arrow arrow-right">►</div>
                <div class="dpad-arrow arrow-down">▼</div>
                <div class="dpad-knob" id="dpad-knob"></div>
            </div>

            <!-- Action buttons -->
            <div class="action-cluster">
                <button class="action-circle a1" data-dir="punch">
                    <span>A1</span>
                </button>
                <button class="action-circle a2" data-dir="kick">
                    <span>A2</span>
                </button>
                <button class="action-circle a3" data-dir="special">
                    <span>A3</span>
                </button>
                <button class="action-circle jmp" data-dir="jump">
                    <span>JMP</span>
                </button>
            </div>

        </div>
    </div>

    <!-- Racer Controller -->
    <div id="racer-controller" class="controller hidden">
        <h2 id="racer-welcome">RACE!</h2>

        <div class="racer-layout">

            <!-- Speed / Gear HUD -->
            <div class="racer-hud">
                <div class="hud-speed">
                    <span id="racer-speed">0</span>
                    <p>MPH</p>
                </div>
                <div class="hud-arc-wrap">
                    <svg class="hud-arc" viewBox="0 0 200 100">
                        <path d="M10,95 A90,90 0 0,1 190,95" fill="none" stroke="rgba(255,255,255,0.08)"
                            stroke-width="10" stroke-linecap="round" />
                        <path id="hud-arc-fill" d="M10,95 A90,90 0 0,1 190,95" fill="none" stroke="#00e0ff"
                            stroke-width="10" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283" />
                    </svg>
                    <span class="hud-arc-label" id="racer-gear-mid">1</span>
                </div>
                <div class="hud-gear">
                    <p>GEAR</p>
                    <span id="racer-gear">1</span>
                </div>
            </div>

            <div class="racer-main-row">

                <!-- Rotating steering wheel -->
                <div class="wheel-zone" id="wheel-zone">
                    <svg class="wheel-svg" id="wheel-svg" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="88" fill="none" stroke="#00e0ff" stroke-width="10" />
                        <circle cx="100" cy="100" r="40" fill="none" stroke="#00e0ff" stroke-width="6" />
                        <line x1="100" y1="60" x2="100" y2="12" stroke="#00e0ff" stroke-width="8"
                            stroke-linecap="round" />
                        <line x1="65" y1="120" x2="30" y2="150" stroke="#00e0ff" stroke-width="8"
                            stroke-linecap="round" />
                        <line x1="135" y1="120" x2="170" y2="150" stroke="#00e0ff" stroke-width="8"
                            stroke-linecap="round" />
                    </svg>
                </div>

                <!-- Throttle / Brake vertical sliders -->
                <div class="pedal-bars">
                    <div class="pedal-bar throttle-bar" id="throttle-bar" data-role="throttle">
                        <span class="pedal-bar-label vertical">THROTLE</span>
                        <div class="pedal-bar-track">
                            <div class="pedal-bar-fill" id="throttle-fill"></div>
                        </div>
                    </div>

                    <div class="pedal-bar brake-bar" id="brake-bar" data-role="brake">
                        <span class="pedal-bar-label vertical">BRAKE</span>
                        <div class="pedal-bar-track">
                            <div class="pedal-bar-fill" id="brake-fill"></div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="pedal-captions">
                <span>THROTTLE</span>
                <span>BRAKE</span>
            </div>

            <button class="boost-circle" id="boost-btn">
                <span>⚡</span>
            </button>

        </div>
    </div>

    <!-- Game Selection -->
    <div id="game-select" class="hidden">
        <h2>Pick Controller Type</h2>
        <button class="select-btn" data-game="survive">UNO Card Game</button>
        <button class="select-btn" data-game="fighter">Fighter Mode</button>
        <button class="select-btn" data-game="racer">Racer Mode</button>
    </div>

    <script src="https://fun-match-production.up.railway.app/socket.io/socket.io.js"></script>
    <script src="controller.js"></script>
</body>

</html>
