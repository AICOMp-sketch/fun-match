<!DOCTYPE html>
<html lang="en">

<head>
    <script src="global/loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fun Match - Controller</title>
    <link rel="stylesheet" href="controller.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <div id="join-screen">
        <h1>FUN MATCH</h1>
        <p>Join the game</p>

        <input type="text" id="name-input" placeholder="Your Name" maxlength="10">
        <input type="text" id="code-input" placeholder="ROOM CODE" maxlength="4">

        <button id="join-btn">JOIN GAME</button>
        <p id="error-msg"></p>
    </div>

    <!-- UNO Controller -->
    <div id="uno-controller" class="controller hidden">
        <div class="uno-header">
            <h2 id="uno-welcome">UNO</h2>
            <p id="uno-status">Waiting for game to start...</p>
        </div>

        <div class="uno-top-card-display">
            <p class="uno-label">TOP CARD</p>
            <div id="uno-top-card" class="uno-mini-card">
                <span>-</span>
            </div>
            <p class="uno-color-label">Color: <span id="uno-current-color">-</span></p>
        </div>

        <div class="uno-hand" id="uno-hand">
            <p class="no-cards">Waiting for cards...</p>
        </div>

        <div class="uno-actions">
            <button id="uno-draw-btn" class="uno-action-btn" disabled>DRAW CARD</button>
        </div>

        <div id="uno-color-picker" class="uno-color-picker hidden">
            <h3>Pick a color</h3>
            <div class="uno-colors">
                <button class="uno-color red" data-color="red"></button>
                <button class="uno-color blue" data-color="blue"></button>
                <button class="uno-color green" data-color="green"></button>
                <button class="uno-color yellow" data-color="yellow"></button>
            </div>
        </div>

        <p id="uno-error" class="uno-error"></p>
    </div>

    <!-- Fighter Controller -->
    <div id="fighter-controller" class="controller hidden">
        <h2 id="fighter-welcome">FIGHT!</h2>

        <div class="fighter-layout">
            <div class="movement-pad">
                <button class="ctrl-btn fight-dpad up" data-dir="up">▲</button>
                <button class="ctrl-btn fight-dpad left" data-dir="left">◄</button>
                <button class="ctrl-btn fight-dpad right" data-dir="right">►</button>
                <button class="ctrl-btn fight-dpad down" data-dir="down">▼</button>
            </div>

            <div class="action-pad">
                <button class="ctrl-btn action-btn punch" data-dir="punch">
                    <span class="action-letter">P</span>
                    <span class="action-label">PUNCH</span>
                </button>
                <button class="ctrl-btn action-btn kick" data-dir="kick">
                    <span class="action-letter">K</span>
                    <span class="action-label">KICK</span>
                </button>
                <button class="ctrl-btn action-btn special" data-dir="special">
                    <span class="action-letter">SP</span>
                    <span class="action-label">SPECIAL</span>
                </button>
                <button class="ctrl-btn action-btn block" data-dir="block">
                    <span class="action-letter">BL</span>
                    <span class="action-label">BLOCK</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Racer Controller -->
    <div id="racer-controller" class="controller hidden">
        <h2 id="racer-welcome">RACE!</h2>

        <div class="racer-layout">
            <div class="steering">
                <button class="ctrl-btn steer-btn left-steer" data-dir="left">◄</button>
                <button class="ctrl-btn steer-btn right-steer" data-dir="right">►</button>
            </div>

            <div class="pedals">
                <button class="ctrl-btn pedal gas-btn" data-dir="punch">
                    <span class="pedal-icon">▲</span>
                    <span class="pedal-label">GAS</span>
                </button>
                <button class="ctrl-btn pedal brake-btn" data-dir="kick">
                    <span class="pedal-icon">▼</span>
                    <span class="pedal-label">BRAKE</span>
                </button>
            </div>

            <button class="ctrl-btn boost-btn" data-dir="special">
                <span class="boost-icon">⚡</span>
                <span class="boost-label">BOOST</span>
            </button>
        </div>
    </div>

    <!-- Game Selection -->
    <div id="game-select" class="hidden">
        <h2>Pick Controller Type</h2>
        <button class="select-btn" data-game="survive">UNO Card Game</button>
        <button class="select-btn" data-game="fighter">Fighter Mode</button>
        <button class="select-btn" data-game="racer">Racer Mode</button>
    </div>

    <script src="https://fun-match-production.up.railway.app/socket.io/socket.io.js"></script>
    <script src="controller.js"></script>
</body>

</html>
