<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../global/loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fun Match</title>
    <link rel="stylesheet" href="auth.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Press+Start+2P&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <!-- LEFT SIDE -->
        <div class="auth-visual">
            <div class="visual-top">
                <a href="../" class="visual-logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
                            <path d="M4 4L12 12L4 20M12 4L20 12L12 20" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </a>

                <h1 class="visual-title">Join The<br><span class="gradient-text">Party!</span></h1>
                <p class="visual-subtitle">Create your account and start playing with friends in
                    <strong>seconds.</strong>
                </p>

                <div class="visual-friends">
                    <div class="friends-avatars">
                        <div class="friend-avatar avatar-1"></div>
                        <div class="friend-avatar avatar-2"></div>
                        <div class="friend-avatar avatar-3"></div>
                        <div class="friend-avatar avatar-4"></div>
                        <div class="friend-avatar avatar-more">+</div>
                    </div>
                    <p class="friends-text">Play with your friends <span class="gradient-text">nonstop!</span></p>
                </div>
            </div>

            <div class="visual-video-container">
                <video autoplay muted loop playsinline class="visual-video" id="auth-video">
                    <source src="../videos/Auth-Background.mp4" type="video/mp4">
                </video>
                <div class="video-blend-overlay"></div>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="auth-form-side">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Start your gaming journey today</p>
                </div>

                <form class="auth-form" id="signup-form">
                    <!-- Error/Success Messages -->
                    <div id="form-message"></div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="input-icon-emoji">✉️</span>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon-emoji">🔒</span>
                            <input type="password" id="password" placeholder="At least 8 characters" required
                                minlength="8">
                            <button type="button" class="toggle-password" id="toggle-password"
                                aria-label="Show password">
                                <span class="eye-icon">👁️</span>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strength-bar"></div>
                            <span class="strength-text" id="strength-text">Password strength</span>
                        </div>
                    </div>

                    <label class="checkbox-wrapper terms-checkbox">
                        <input type="checkbox" id="terms" required>
                        <span class="checkmark"></span>
                        <span>I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#"
                                class="terms-link">Privacy Policy</a></span>
                    </label>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span class="btn-text">Create Account <span class="btn-arrow">→</span></span>
                        <div class="btn-spinner"></div>
                    </button>

                    <div class="divider">
                        <span>or sign up with</span>
                    </div>

                    <div class="social-buttons">
                        <button type="button" class="social-btn google" id="google-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path fill="#4285F4"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path fill="#34A853"
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05"
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335"
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            Google
                        </button>
                        <button type="button" class="social-btn facebook" id="facebook-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="#1877F2">
                                <path
                                    d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                            </svg>
                            Facebook
                        </button>
                    </div>

                    <p class="form-footer">
                        Already have an account?
                        <a href="signin.html">Sign in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Supabase SDK + Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../global/supabase.js"></script>

    <script>
        // Toggle password
        document.getElementById('toggle-password').addEventListener('click', function () {
            var passwordInput = document.getElementById('password');
            var eyeIcon = this.querySelector('.eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🔓';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        });

        // Password strength
        document.getElementById('password').addEventListener('input', function () {
            var password = this.value;
            var strength = 0;

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            var bar = document.getElementById('strength-bar');
            var text = document.getElementById('strength-text');

            bar.className = 'strength-bar';
            if (strength === 0) {
                text.textContent = 'Password strength';
            } else if (strength === 1) {
                bar.classList.add('weak');
                text.textContent = 'Weak';
            } else if (strength === 2) {
                bar.classList.add('medium');
                text.textContent = 'Medium';
            } else if (strength === 3) {
                bar.classList.add('good');
                text.textContent = 'Good';
            } else {
                bar.classList.add('strong');
                text.textContent = 'Strong';
            }
        });

        // Show message
        function showMessage(text, type) {
            var msgEl = document.getElementById('form-message');
            msgEl.innerHTML = '<div class="' + type + '-message">' + text + '</div>';
            setTimeout(function () {
                msgEl.innerHTML = '';
            }, 5000);
        }

        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var terms = document.getElementById('terms').checked;
            var submitBtn = document.getElementById('submit-btn');
            var btnText = submitBtn.querySelector('.btn-text');

            // Validation
            if (!terms) {
                showMessage('Please agree to the Terms of Service', 'error');
                submitBtn.classList.add('error');
                setTimeout(function () { submitBtn.classList.remove('error'); }, 500);
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                submitBtn.classList.add('error');
                setTimeout(function () { submitBtn.classList.remove('error'); }, 500);
                return;
            }

            // Start loading
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            var result = await signUpWithEmail(email, password);

            if (result.error) {
                // Error - shake and reset
                submitBtn.classList.remove('loading');
                submitBtn.classList.add('error');
                submitBtn.disabled = false;

                setTimeout(function () {
                    submitBtn.classList.remove('error');
                }, 500);

                showMessage(result.error, 'error');
            } else {
                // Success
                submitBtn.classList.remove('loading');
                submitBtn.classList.add('success');
                btnText.innerHTML = 'Account Created! <span class="btn-arrow">✓</span>';

                showMessage('Check your email to confirm your account!', 'success');

                setTimeout(function () {
                    window.location.href = 'signin.html';
                }, 3000);
            }
        });

        // Google Sign Up
        document.getElementById('google-btn').addEventListener('click', async function () {
            var result = await signInWithGoogle();
            if (result.error) {
                showMessage(result.error, 'error');
            }
        });

        // Facebook Sign In
        document.getElementById('facebook-btn').addEventListener('click', async function () {
            var result = await signInWithFacebook();
            if (result.error) {
                showMessage(result.error, 'error');
            }
        });

        // Check if already logged in
        (async function () {
            var loggedIn = await isLoggedIn();
            if (loggedIn) {
                window.location.href = '../hub/';
            }
        })();
    </script>
</body>

</html>
