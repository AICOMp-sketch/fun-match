<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../global/loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Fun Match</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <!-- LEFT SIDE - Visual with Video -->
        <div class="auth-visual">
            <div class="visual-top">
                <a href="../" class="visual-logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
                            <path d="M4 4L12 12L4 20M12 4L20 12L12 20" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </a>

                <h1 class="visual-title">Welcome<br><span class="gradient-text">Back!</span></h1>
                <p class="visual-subtitle">Ready to jump back into the action? Your friends are
                    <strong>waiting.</strong>
                </p>

                <div class="visual-friends">
                    <div class="friends-avatars">
                        <div class="friend-avatar avatar-1"></div>
                        <div class="friend-avatar avatar-2"></div>
                        <div class="friend-avatar avatar-3"></div>
                        <div class="friend-avatar avatar-4"></div>
                        <div class="friend-avatar avatar-more">+</div>
                    </div>
                    <p class="friends-text">Play with your friends <span class="gradient-text">nonstop!</span></p>
                </div>
            </div>

            <div class="visual-video-container">
                <video autoplay muted loop playsinline class="visual-video" id="auth-video">
                    <source src="../videos/Auth-Background.mp4" type="video/mp4">
                </video>
                <div class="video-blend-overlay"></div>
            </div>
        </div>

        <!-- RIGHT SIDE - Form -->
        <div class="auth-form-side">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2>Sign In</h2>
                    <p>Enter your details to continue playing</p>
                </div>

                <form class="auth-form" id="signin-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="input-icon-emoji">✉️</span>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon-emoji">🔒</span>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">
                                <span class="eye-icon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="submit-btn">
                        Sign In
                        <span class="btn-arrow">→</span>
                    </button>

                    <div class="divider">
                        <span>or continue with</span>
                    </div>

                    <div class="social-buttons">
                        <button type="button" class="social-btn google">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Google
                        </button>
                        <button type="button" class="social-btn discord">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="#5865F2">
                                <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                            </svg>
                            Discord
                        </button>
                    </div>

                    <p class="form-footer">
                        Don't have an account?
                        <a href="signup.html">Sign up</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = this.querySelector('.eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🔓';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        });

        // Form submit
        document.getElementById('signin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Sign in coming soon! For now, just enjoy exploring the site.');
        });
    </script>
</body>

</html>
