<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Fighters - Fun Match</title>
  <link rel="stylesheet" href="game.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ════════ LOADING/WAITING SCREEN ════════ -->
  <div id="waiting-screen" class="screen active">
    <a href="../../" class="back-btn">← Back to Hub</a>

    <div class="waiting-content">
      <h1 class="game-title">PIXEL <span>FIGHTERS</span></h1>
      <p class="game-subtitle">A real-time multiplayer fighting arena</p>

      <div class="room-display">
        <p class="room-label">ROOM CODE</p>
        <h2 class="room-code-big" id="room-code">----</h2>
        <p class="room-hint">Join on phone: <span>fun-match.pages.dev/controller.html</span></p>
      </div>

      <div class="players-waiting">
        <div class="player-slot empty" id="slot-1">
          <div class="slot-icon">?</div>
          <p>Waiting...</p>
        </div>
        <div class="vs-divider">VS</div>
        <div class="player-slot empty" id="slot-2">
          <div class="slot-icon">?</div>
          <p>Waiting...</p>
        </div>
      </div>

      <button id="bot-mode-btn" class="bot-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
          <rect x="3" y="11" width="18" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="2"/>
          <path d="M12 7v4M8 16h.01M16 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        FIGHT A BOT
      </button>
    </div>
  </div>

  <!-- ════════ FIGHTING SCREEN ════════ -->
  <div id="fight-screen" class="screen">

    <!-- Top HUD -->
    <div class="hud">
      <div class="player-hud left">
        <div class="player-info">
          <h3 class="player-name" id="p1-name">PLAYER 1</h3>
          <div class="rounds-won" id="p1-rounds">
            <span class="round-dot"></span>
            <span class="round-dot"></span>
          </div>
        </div>
        <div class="hp-bar">
          <div class="hp-fill" id="p1-hp" style="width: 100%"></div>
        </div>
      </div>

      <div class="center-hud">
        <div class="timer" id="timer">99</div>
        <div class="round-text" id="round-text">ROUND 1</div>
      </div>

      <div class="player-hud right">
        <div class="player-info">
          <h3 class="player-name" id="p2-name">PLAYER 2</h3>
          <div class="rounds-won" id="p2-rounds">
            <span class="round-dot"></span>
            <span class="round-dot"></span>
          </div>
        </div>
        <div class="hp-bar">
          <div class="hp-fill right-hp" id="p2-hp" style="width: 100%"></div>
        </div>
      </div>
    </div>

    <!-- Battle Arena -->
    <div class="arena">
      <canvas id="gameCanvas" width="1200" height="600"></canvas>

      <!-- Round Announcement -->
      <div id="announcement" class="announcement">
        <h1 id="announcement-text">ROUND 1</h1>
      </div>
    </div>

    <!-- Bottom Info -->
    <div class="bottom-info">
      <div class="control-hint">
        <span class="key">P</span> Punch
        <span class="key">K</span> Kick
        <span class="key">SP</span> Special
        <span class="key">BL</span> Block
      </div>
    </div>

  </div>

  <script src="https://fun-match-production.up.railway.app/socket.io/socket.io.js"></script>
  <script src="sounds.js"></script>
  <script src="game.js"></script>
</body>
</html>
