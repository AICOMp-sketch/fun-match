<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samurai Showdown - Fun Match</title>
  <link rel="stylesheet" href="game.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ════════ WAITING SCREEN ════════ -->
  <div id="waiting-screen" class="screen active">
    <a href="../../" class="back-btn">← Back to Hub</a>

    <div class="waiting-content">
      <h1 class="game-title">SAMURAI<br><span>SHOWDOWN</span></h1>
      <p class="game-subtitle">Master the blade. Defeat your foe.</p>

      <div class="room-display">
        <p class="room-label">ROOM CODE</p>
        <h2 class="room-code-big" id="room-code">. . . .</h2>
        <p class="room-hint">Join on phone: <span>fun-match.pages.dev/controller.html</span></p>
      </div>

      <div class="players-waiting">
        <div class="player-slot" id="slot-1">
          <div class="character-preview samurai-preview"></div>
          <p class="player-name">SAMURAI</p>
          <span class="status">Waiting...</span>
        </div>
        <div class="vs-divider">VS</div>
        <div class="player-slot" id="slot-2">
          <div class="character-preview kenji-preview"></div>
          <p class="player-name">KENJI</p>
          <span class="status">Waiting...</span>
        </div>
      </div>

      <button id="bot-mode-btn" class="action-btn primary">
        FIGHT A BOT
      </button>
    </div>
  </div>

  <!-- ════════ FIGHT SCREEN ════════ -->
  <div id="fight-screen" class="screen">

    <!-- Top HUD -->
    <div class="hud">
      <div class="player-hud left">
        <div class="player-info">
          <h3 class="player-name" id="p1-name">SAMURAI</h3>
          <div class="rounds-won" id="p1-rounds">
            <span class="round-dot"></span>
            <span class="round-dot"></span>
          </div>
        </div>
        <div class="hp-bar">
          <div class="hp-fill" id="p1-hp" style="width: 100%"></div>
        </div>
      </div>

      <div class="center-hud">
        <div class="timer" id="timer">60</div>
        <div class="round-text" id="round-text">ROUND 1</div>
      </div>

      <div class="player-hud right">
        <div class="player-info">
          <h3 class="player-name" id="p2-name">KENJI</h3>
          <div class="rounds-won" id="p2-rounds">
            <span class="round-dot"></span>
            <span class="round-dot"></span>
          </div>
        </div>
        <div class="hp-bar">
          <div class="hp-fill right-hp" id="p2-hp" style="width: 100%"></div>
        </div>
      </div>
    </div>

    <!-- Battle Arena -->
    <div class="arena">
      <canvas id="gameCanvas" width="1024" height="576"></canvas>

      <!-- Round Announcement -->
      <div id="announcement" class="announcement">
        <h1 id="announcement-text">ROUND 1</h1>
      </div>
    </div>

    <!-- Controls hint -->
    <div class="bottom-info">
      <div class="control-hint">
        <span><kbd>A</kbd><kbd>D</kbd> Move</span>
        <span><kbd>W</kbd> Jump</span>
        <span><kbd>S</kbd> Crouch</span>
        <span><kbd>J</kbd> Attack</span>
        <span><kbd>K</kbd> Special</span>
      </div>
    </div>

  </div>

  <script src="https://fun-match-production.up.railway.app/socket.io/socket.io.js"></script>
  <script src="sounds.js"></script>
  <script src="game.js"></script>
</body>
</html>
